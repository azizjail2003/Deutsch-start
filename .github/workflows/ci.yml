name: CI

# Runs on every push to main and on every pull request (including from forks).
# Forked PRs run with a read-only GITHUB_TOKEN and no access to repository
# secrets, so this stays safe even for untrusted contributors.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Reads the pnpm version from the "packageManager" field in package.json,
      # so the version is pinned in exactly one place.
      - name: Install pnpm
        uses: pnpm/action-setup@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
