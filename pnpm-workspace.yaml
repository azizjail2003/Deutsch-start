# Allow these dependencies to run their install build scripts so pnpm install
# does not fail with ERR_PNPM_IGNORED_BUILDS on CI (Vercel). sharp is pulled in
# transitively by Next.js for image optimization.
allowBuilds:
  sharp: true

# Force a patched postcss (>=8.5.10) over the version Next.js pulls in
# transitively, clearing GHSA-qx2v-qp2m-jg93 (a build-time-only XSS in CSS
# stringify that isn't reachable in this app).
overrides:
  postcss@<8.5.10: ">=8.5.10"
